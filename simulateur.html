<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur Financier</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7fa; margin: 0; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 900px; margin: 20px auto; }
        input, button { padding: 12px; margin: 8px 0; border-radius: 8px; }
        button { background: #1e40af; color: white; border: none; font-size: 1.1rem; cursor: pointer; }
        button:hover { background: #2e50c0; }
        #results { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Simulateur Financier</h1>
        
        <label>Âge actuel :</label>
        <input type="number" id="age" value="38"><br>
        
        <label>Revenu annuel ($) :</label>
        <input type="number" id="income" value="145000"><br>
        
        <label>Dépenses annuelles ($) :</label>
        <input type="number" id="expenses" value="92000"><br>
        
        <label>Épargne actuelle ($) :</label>
        <input type="number" id="savings" value="85000"><br>
        
        <label>Épargne mensuelle ($) :</label>
        <input type="number" id="monthly" value="1800"><br>
        
        <button onclick="calculer()">Lancer le calcul</button>
    </div>

    <div id="results" class="card">
        <h2>Résultats</h2>
        <div id="output"></div>
        <canvas id="myChart" height="120"></canvas>
    </div>

    <script>
        let chart;
        function calculer() {
            const age = parseFloat(document.getElementById('age').value);
            const expenses = parseFloat(document.getElementById('expenses').value);
            const savings = parseFloat(document.getElementById('savings').value);
            const monthly = parseFloat(document.getElementById('monthly').value);
            
            const annualSave = monthly * 12;
            let capital = savings;
            let years = 0;
            
            while (capital < expenses * 25 && years < 50) {
                capital = capital * 1.065 + annualSave;
                years++;
            }
            
            const fiAge = age + years;
            
            document.getElementById('output').innerHTML = `
                <p><strong>Âge d'indépendance financière estimé :</strong> ${fiAge} ans</p>
                <p><strong>Patrimoine à 65 ans :</strong> ${(capital/1000000).toFixed(2)} M$</p>
                <p><strong>Taux d'épargne :</strong> ${Math.round((annualSave / parseFloat(document.getElementById('income').value)) * 100)} %</p>
            `;
            
            document.getElementById('results').style.display = 'block';
            
            // Graphique
            const ctx = document.getElementById('myChart');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: years+5}, (_, i) => age + i),
                    datasets: [{
                        label: 'Patrimoine ($)',
                        data: Array.from({length: years+5}, (_, i) => Math.round(savings * Math.pow(1.065, i) + annualSave * i)),
                        borderColor: '#1e40af'
                    }]
                }
            });
        }
    </script>
</body>
</html>
