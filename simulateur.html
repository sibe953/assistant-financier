<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur Financier</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7fa; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 1000px; margin: 20px auto; }
        input { padding: 10px; width: 100%; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; }
        button { background: #1e40af; color: white; padding: 15px; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; width: 100%; margin-top: 15px; }
        #results { display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Simulateur Financier Avancé</h1>
        
        <label>Âge :</label>
        <input type="number" id="age" value="52">
        
        <label>Revenu ménage ($) :</label>
        <input type="number" id="income" value="140000">
        
        <label>Dépenses annuelles ($) :</label>
        <input type="number" id="expenses" value="12000">
        
        <label>Épargne actuelle ($) :</label>
        <input type="number" id="savings" value="1200">
        
        <label>Épargne mensuelle ($) :</label>
        <input type="number" id="monthly" value="1000">
        
        <button onclick="lancerSimulation()">Lancer l'analyse complète</button>
    </div>

    <div id="results" class="card">
        <h2>Résultats</h2>
        <div id="output"></div>
        <canvas id="chart" height="180"></canvas>
    </div>

    <script>
        function lancerSimulation() {
            const age = parseFloat(document.getElementById('age').value) || 52;
            const expenses = parseFloat(document.getElementById('expenses').value) || 12000;
            const savings = parseFloat(document.getElementById('savings').value) || 1200;
            const monthly = parseFloat(document.getElementById('monthly').value) || 1000;
            
            const annualSave = monthly * 12;
            let capital = savings;
            let years = 0;
            
            while (capital < expenses * 25 && years < 50) {
                capital = capital * 1.065 + annualSave;
                years++;
            }
            
            const fiAge = Math.round(age + years);
            
            document.getElementById('output').innerHTML = `
                <p><strong>Âge d'indépendance financière :</strong> ${fiAge} ans</p>
                <p><strong>Patrimoine estimé :</strong> ${(capital / 1000000).toFixed(2)} M$</p>
                <p><strong>Taux d'épargne :</strong> ${Math.round((annualSave / 140000) * 100)}%</p>
            `;
            
            document.getElementById('results').style.display = 'block';
            
            // Graphique
            const ctx = document.getElementById('chart');
            if (window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: 20}, (_, i) => age + i),
                    datasets: [{
                        label: 'Évolution du patrimoine',
                        data: Array.from({length: 20}, (_, i) => Math.round(savings * Math.pow(1.065, i) + annualSave * i)),
                        borderColor: '#1e40af',
                        tension: 0.3
                    }]
                },
                options: { responsive: true }
            });
        }
    </script>
</body>
</html>
